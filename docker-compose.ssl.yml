# Docker Compose with SSL/HTTPS Support
# Production configuration with Let's Encrypt or self-signed certificates

version: '3.8'

services:
  # Nginx with SSL/HTTPS
  nginx-lb:
    image: nginx:alpine
    container_name: nginx-ssl-lb
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
      - frontend-build:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      - media-link-scanner
      - scraper-backend-1
      - scraper-backend-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  media-link-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-link-scanner-ssl
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HTTPS=true
    volumes:
      - frontend-build:/app/dist
    networks:
      - app-network

  # Backend API Instances (Load Balanced)
  scraper-backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-backend-ssl-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=backend-1
      - REDIS_URL=redis://redis:6379
      - PUPPETEER_HEADLESS=true
      - SSL_ENABLED=true
    volumes:
      - scraper-storage:/app/storage
      - ./ssl:/app/ssl:ro
    networks:
      - app-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  scraper-backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-backend-ssl-2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=backend-2
      - REDIS_URL=redis://redis:6379
      - PUPPETEER_HEADLESS=true
      - SSL_ENABLED=true
    volumes:
      - scraper-storage:/app/storage
      - ./ssl:/app/ssl:ro
    networks:
      - app-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scraper Worker Pool (3 workers for SSL)
  scraper-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-worker-ssl-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - WORKER_ID=1
      - REDIS_URL=redis://redis:6379
      - SSL_ENABLED=true
    volumes:
      - scraper-storage:/app/storage
      - ./ssl:/app/ssl:ro
    networks:
      - app-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

  scraper-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-worker-ssl-2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - WORKER_ID=2
      - REDIS_URL=redis://redis:6379
      - SSL_ENABLED=true
    volumes:
      - scraper-storage:/app/storage
      - ./ssl:/app/ssl:ro
    networks:
      - app-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

  scraper-worker-3:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-worker-ssl-3
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - WORKER_ID=3
      - REDIS_URL=redis://redis:6379
      - SSL_ENABLED=true
    volumes:
      - scraper-storage:/app/storage
      - ./ssl:/app/ssl:ro
    networks:
      - app-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: scraper-redis-ssl
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Sentinel for HA
  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel-ssl
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis-sentinel.conf:/etc/redis/sentinel.conf:ro
      - redis-sentinel-data:/data
    networks:
      - app-network
    depends_on:
      - redis

volumes:
  frontend-build:
    driver: local
  scraper-storage:
    driver: local
  redis-data:
    driver: local
  redis-sentinel-data:
    driver: local

networks:
  app-network:
    driver: bridge
