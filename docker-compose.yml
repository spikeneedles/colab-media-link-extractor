version: '3.8'

services:
  # FlareSolverr — Cloudflare bypass proxy (used by Prowlarr + our scrapers)
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    networks:
      - app-network

  # Frontend web application
  media-link-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-link-scanner
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://scraper-backend:3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    depends_on:
      scraper-backend:
        condition: service_healthy

  # Backend API and scraper/crawler service
  scraper-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-backend
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - MAX_CONCURRENT_SCRAPERS=5
      - SCRAPER_TIMEOUT=300000
      - CRAWLER_STORAGE_PATH=/app/storage/crawlers
      - SCRAPER_STORAGE_PATH=/app/storage/scrapers
      - REDIS_URL=redis://redis:6379
    volumes:
      - scraper-storage:/app/storage
      - ./backend/src:/app/src:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    container_name: scraper-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Scraper worker pool - scaled instances for parallel processing
  scraper-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-worker-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - WORKER_ID=1
      - REDIS_URL=redis://redis:6379
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - MAX_CONCURRENT_JOBS=3
    volumes:
      - scraper-storage:/app/storage
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      scraper-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M

  scraper-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: scraper-worker-2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - WORKER_ID=2
      - REDIS_URL=redis://redis:6379
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - MAX_CONCURRENT_JOBS=3
    volumes:
      - scraper-storage:/app/storage
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      scraper-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  scraper-storage:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
