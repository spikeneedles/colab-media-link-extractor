name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      release-type:
        description: 'Type of release'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
          
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          # Generate changelog
          echo "## What's Changed" > CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          
          # Get commits since last tag
          git log $PREV_TAG..HEAD --pretty=format:"* %s (%h)" --no-merges >> CHANGELOG.tmp
          
          # Add contributors
          echo "" >> CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          echo "## Contributors" >> CHANGELOG.tmp
          git log $PREV_TAG..HEAD --pretty=format:"* @%an" --no-merges | sort -u >> CHANGELOG.tmp
          
          # Save to output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.tmp >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-assets:
    name: Build Release Assets
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: media-link-scanner-linux
          - os: windows-latest
            asset_name: media-link-scanner-windows
          - os: macos-latest
            asset_name: media-link-scanner-macos
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Package for distribution
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a -tzip ../${{ matrix.asset_name }}.zip .
          else
            tar -czf ../${{ matrix.asset_name }}.tar.gz .
          fi
          
      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ${{ matrix.asset_name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-documentation:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update version in documentation
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          
          # Update version in README
          sed -i "s/Version: v[0-9]*\.[0-9]*\.[0-9]*/Version: $VERSION/g" README.md
          
          # Update CHANGELOG
          DATE=$(date +%Y-%m-%d)
          sed -i "1i ## [$VERSION] - $DATE\n\nSee [release notes](https://github.com/${{ github.repository }}/releases/tag/$VERSION)\n" CHANGELOG.md
          
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md CHANGELOG.md
          git commit -m "docs: update version to ${{ needs.create-release.outputs.version }}" || echo "No changes to commit"
          git push

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-release-assets]
    if: always()
    
    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        if: always() && secrets.DISCORD_WEBHOOK != ''
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "New Release Published"
          description: |
            **Version:** ${{ needs.create-release.outputs.version }}
            **Status:** ${{ job.status }}
            [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }})
          color: 0x00FF00
          
      - name: Tweet release announcement
        uses: Eomm/why-don-t-you-tweet@v1
        if: success() && secrets.TWITTER_API_KEY != ''
        with:
          tweet-message: |
            🎉 Media Link Scanner ${{ needs.create-release.outputs.version }} is now available!
            
            AI-powered IPTV & Kodi scanner with support for 50+ formats.
            
            Download: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }}
            
            #IPTV #Kodi #MediaScanner
        env:
          TWITTER_CONSUMER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_CONSUMER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
