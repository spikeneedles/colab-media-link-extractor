<!DOCTYPE html>
<html>
<head>
  <title>Generate Rabbit Icon 32x32</title>
</head>
<body>
  <h1>Right-click the canvas below and "Save Image As..." to get icon32.png</h1>
  <canvas id="icon" width="32" height="32"></canvas>
  
  <script>
    const canvas = document.getElementById('icon');
    const ctx = canvas.getContext('2d');
    const size = 32;
    const scale = size / 128;
    
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#0F172A');
    gradient.addColorStop(1, '#1E293B');
    ctx.fillStyle = gradient;
    const cornerRadius = size * 0.1875;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, cornerRadius);
    ctx.fill();
    
    const centerX = size / 2;
    const centerY = size / 2;
    
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.scale(scale, scale);
    
    // Left ear
    ctx.save();
    ctx.translate(-18, -28);
    ctx.rotate(-15 * Math.PI / 180);
    ctx.fillStyle = '#93C5FD';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#DBEAFE';
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    
    // Right ear
    ctx.save();
    ctx.translate(18, -28);
    ctx.rotate(15 * Math.PI / 180);
    ctx.fillStyle = '#93C5FD';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#DBEAFE';
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    
    // Head
    ctx.fillStyle = '#60A5FA';
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#1E293B';
    ctx.beginPath();
    ctx.arc(-8, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye highlights
    ctx.fillStyle = '#DBEAFE';
    ctx.beginPath();
    ctx.arc(-7, -5, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(9, -5, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Nose
    ctx.fillStyle = '#EC4899';
    ctx.beginPath();
    ctx.ellipse(0, 2, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Whiskers (simplified)
    ctx.strokeStyle = '#1E293B';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-10, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-20, 3);
    ctx.lineTo(-10, 4);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(10, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(20, 3);
    ctx.lineTo(10, 4);
    ctx.stroke();
    
    // Teeth
    ctx.fillStyle = '#F8FAFC';
    ctx.fillRect(-2, 8, 1.5, 3);
    ctx.fillRect(0.5, 8, 1.5, 3);
    
    // Scanner waves
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#60A5FA';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);
    
    ctx.restore();
    
    // Auto download
    setTimeout(() => {
      const link = document.createElement('a');
      link.download = 'icon32.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      document.body.innerHTML += '<p style="color: green;">✓ icon32.png downloaded!</p>';
    }, 500);
  </script>
</body>
</html>
