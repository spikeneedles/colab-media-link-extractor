<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="128" height="128" rx="24" fill="url(#gradient)"/>
  
  <!-- Rabbit Scanner -->
  <g transform="translate(64, 64)">
    <!-- Left ear -->
    <ellipse cx="-18" cy="-28" rx="8" ry="24" fill="#93C5FD" transform="rotate(-15 -18 -28)"/>
    <ellipse cx="-18" cy="-28" rx="4" ry="18" fill="#DBEAFE" transform="rotate(-15 -18 -28)"/>
    
    <!-- Right ear -->
    <ellipse cx="18" cy="-28" rx="8" ry="24" fill="#93C5FD" transform="rotate(15 18 -28)"/>
    <ellipse cx="18" cy="-28" rx="4" ry="18" fill="#DBEAFE" transform="rotate(15 18 -28)"/>
    
    <!-- Head -->
    <circle cx="0" cy="0" r="22" fill="#60A5FA"/>
    
    <!-- Eyes -->
    <circle cx="-8" cy="-4" r="3" fill="#1E293B"/>
    <circle cx="8" cy="-4" r="3" fill="#1E293B"/>
    <circle cx="-7" cy="-5" r="1.5" fill="#DBEAFE"/>
    <circle cx="9" cy="-5" r="1.5" fill="#DBEAFE"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="2" rx="3" ry="2" fill="#EC4899"/>
    
    <!-- Whiskers -->
    <line x1="-22" y1="0" x2="-10" y2="-2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-22" y1="2" x2="-10" y2="2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-22" y1="4" x2="-10" y2="6" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="10" y2="-2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="2" x2="10" y2="2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="4" x2="10" y2="6" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Mouth -->
    <path d="M 0 4 Q -3 7, 0 8 Q 3 7, 0 4" fill="none" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Teeth -->
    <rect x="-2" y="8" width="1.5" height="3" rx="0.5" fill="#F8FAFC"/>
    <rect x="0.5" y="8" width="1.5" height="3" rx="0.5" fill="#F8FAFC"/>
    
    <!-- Scanner waves (coming from rabbit) -->
    <g opacity="0.7">
      <circle cx="0" cy="0" r="28" stroke="#60A5FA" stroke-width="2" fill="none" stroke-dasharray="4 4">
        <animate attributeName="r" from="28" to="40" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="0.7" to="0" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="28" stroke="#93C5FD" stroke-width="2" fill="none" stroke-dasharray="4 4">
        <animate attributeName="r" from="28" to="40" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="0.7" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Media link icon on chest -->
    <g transform="translate(0, 16)">
      <path d="M -4 -2 L -4 2 L 0 0 Z" fill="#DBEAFE"/>
      <circle cx="3" cy="0" r="1.5" fill="#DBEAFE"/>
      <circle cx="6" cy="0" r="1" fill="#DBEAFE"/>
    </g>
  </g>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
