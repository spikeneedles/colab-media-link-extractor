<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Link Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #334155;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #60a5fa;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    input[type="text"], select {
      width: 100%;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #60a5fa;
    }

    input[type="text"]::placeholder {
      color: #64748b;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      margin-bottom: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #334155;
    }

    .btn-secondary:hover {
      background: #475569;
      box-shadow: 0 4px 12px rgba(51, 65, 85, 0.3);
    }

    .recent-jobs {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #334155;
    }

    .recent-jobs h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    .job-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .job-item .job-label {
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .job-item .job-meta {
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 11px;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-running {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-completed {
      background: #d1fae5;
      color: #065f46;
    }

    .status-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .alert {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 13px;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #334155;
      text-align: center;
    }

    .footer a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #93c5fd;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid #334155;
      border-top: 3px solid #60a5fa;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Media Link Scanner">
    <h1>Media Link Scanner</h1>
  </div>

  <div id="alert" class="alert"></div>

  <form id="scanForm">
    <div class="form-group">
      <label for="urlInput">URL to Scan</label>
      <input 
        type="text" 
        id="urlInput" 
        placeholder="https://github.com/user/repo or http://provider.tv/playlist.m3u8"
        required
      >
    </div>

    <div class="form-group">
      <label for="labelInput">Label (optional)</label>
      <input 
        type="text" 
        id="labelInput" 
        placeholder="My IPTV Provider"
      >
    </div>

    <div class="form-group">
      <label for="typeSelect">Media Type</label>
      <select id="typeSelect">
        <option value="auto">Auto-detect</option>
        <option value="repository">Repository (GitHub, GitLab, etc.)</option>
        <option value="web">Web Page / Playlist URL</option>
        <option value="file">File (APK, ZIP, etc.)</option>
      </select>
    </div>

    <button type="submit" class="btn">
      📡 Send to Scanner
    </button>
  </form>

  <button id="openScanner" class="btn btn-secondary">
    🚀 Open Scanner App
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 12px; font-size: 13px;">Sending to scanner...</p>
  </div>

  <div class="recent-jobs">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <h2>Recent Jobs</h2>
      <button id="clearJobs" style="background: none; border: none; color: #64748b; cursor: pointer; font-size: 11px; padding: 4px 8px;">Clear</button>
    </div>
    <div id="jobsList"></div>
  </div>

  <div class="footer">
    <a href="options.html" target="_blank">⚙️ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
